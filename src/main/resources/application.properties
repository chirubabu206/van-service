# 💻 Local Development Fallback (MySQL)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/van_db}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:your_local_password}

# 🔄 Automatic Dialect Switching for Hibernate
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true