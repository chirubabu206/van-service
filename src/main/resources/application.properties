# 🌐 WEB SERVER PORT BINDING
server.port=${PORT:8080}

# 🐘 Cloud Production Database Connection Configuration
# If Render provides a DB_URL, it uses it. Otherwise, it defaults to your cloud Neon connection string!
spring.datasource.url=${DB_URL:jdbc:postgresql://ep-cool-pool-a5xyz.us-east-2.aws.neon.tech/van_db?sslmode=require}
spring.datasource.username=${DB_USER:your_neon_username_here}
spring.datasource.password=${DB_PASSWORD:your_neon_password_here}

# 🔄 Automatic Dialect Switching for Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 📦 Driver class declaration
spring.datasource.driver-class-name=org.postgresql.Driver

# 🛡️ FAIL-SAFE: Prevents Hikari from crashing the app completely if the DB takes a few seconds to wake up
spring.datasource.hikari.initialization-fail-timeout=-1