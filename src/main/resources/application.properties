# 🌐 WEB SERVER PORT BINDING (Fixes the Render Port Scan Timeout)
server.port=${PORT:8080}

# 🐘 Cloud Production & Local Development Configuration (PostgreSQL)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/van_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:root}

# 🔄 Automatic Dialect Switching for Hibernate (PostgreSQL Native Layout)
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 📦 Driver class declaration
spring.datasource.driver-class-name=org.postgresql.Driver