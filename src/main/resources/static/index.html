<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Van Service Master Ledger</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background-color: #f8fafc; color: #1e293b; padding: 30px; }
        .dashboard-container { max-width: 1100px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #f1f5f9; padding-bottom: 20px; }
        h1 { color: #1e3a8a; font-size: 26px; display: flex; align-items: center; gap: 10px; }
        .btn-group { display: flex; gap: 12px; }
        .btn { padding: 10px 18px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; text-decoration: none; border: none; transition: background 0.2s; display: inline-flex; align-items: center; gap: 6px; }
        .btn-add { background-color: #3b82f6; color: white; }
        .btn-add:hover { background-color: #2563eb; }
        .btn-trigger { background-color: #8b5cf6; color: white; }
        .btn-trigger:hover { background-color: #7c3aed; }
        .btn-logout { background-color: #ef4444; color: white; }
        .btn-logout:hover { background-color: #dc2626; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; text-align: left; }
        th { background-color: #f1f5f9; color: #475569; font-weight: 600; padding: 14px; font-size: 13px; text-transform: uppercase; border-bottom: 2px solid #cbd5e1; }
        td { padding: 14px; border-bottom: 1px solid #e2e8f0; font-size: 14px; vertical-align: middle; }
        tr:hover { background-color: #f8fafc; }

        .badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; display: inline-block; }
        .badge-paid { background-color: #d1fae5; color: #065f46; }
        .badge-pending { background-color: #fee2e2; color: #dc2626; }
        .badge-month { background-color: #e0f2fe; color: #0369a1; }

        .action-input-group { display: flex; gap: 6px; align-items: center; }
        .pin-input { width: 70px; padding: 6px; border: 2px solid #cbd5e1; border-radius: 6px; font-size: 13px; text-align: center; outline: none; }
        .pin-input:focus { border-color: #3b82f6; }
        .btn-verify { padding: 6px 12px; background-color: #10b981; color: white; font-size: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; }
        .btn-verify:hover { background-color: #059669; }

        .phone-link { color: #2563eb; text-decoration: none; font-weight: 500; }
        .phone-link:hover { text-decoration: underline; }
        .text-muted { color: #94a3b8; font-style: italic; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="header-flex">
        <h1>🚌 Van Service Management Dashboard</h1>
        <div class="btn-group">
            <a href="add-student.html" class="btn btn-add">➕ Add Student</a>
            <button onclick="triggerNextMonth()" class="btn btn-trigger">🗓️ Next Month Billing</button>
            <button onclick="logoutAccount()" class="btn btn-logout">🚪 Sign Out</button>
        </div>
    </div>

    <table id="ledgerTable">
        <thead>
        <tr>
            <th>Student Name</th>
            <th>📞 Parent Phone</th>
            <th>📍 Pickup Location</th>
            <th>Monthly Fee</th>
            <th>Outstanding</th>
            <th>Pending Months</th>
            <th>Status</th>
            <th>Payment Collection (Enter 4-Digit Pin)</th>
        </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
    </table>
</div>

<script>
    // 🔄 Auto Fetch on view initialization
    window.onload = loadDashboardData;

    async function loadDashboardData() {
        try {
            const res = await fetch('/api/students/list');
            if (res.status === 403 || res.status === 401) {
                window.location.href = "/login.html";
                return;
            }

            const students = await res.json();
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = ''; // Clean view memory grid

            if (students.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="8" style="text-align:center; color:#64748b; padding:30px;">No students registered under your driver account yet. Click Add Student above to start!</td></tr>`;
                return;
            }

            students.forEach(student => {
                const row = document.createElement('tr');

                // Formats fallback states if tracking entries are legacy empty strings
                const displayPhone = student.parentPhone ? `<a class="phone-link" href="tel:${student.parentPhone}">📞 ${student.parentPhone}</a>` : `<span class="text-muted">—</span>`;
                const displayLocation = student.pickupLocation ? `📍 <strong>${student.pickupLocation}</strong>` : `<span class="text-muted">—</span>`;

                row.innerHTML = `
                    <td><strong>${student.studentName}</strong></td>
                    <td>${displayPhone}</td>
                    <td>${displayLocation}</td>
                    <td>₹${student.monthlyFee}</td>
                    <td style="font-weight:700; color:${student.currentPendingFee > 0 ? '#dc2626' : '#059669'}">₹${student.currentPendingFee}</td>
                    <td><span class="badge badge-month">${student.pendingMonths}</span></td>
                    <td>
                        <span class="badge ${student.currentPaymentStatus ? 'badge-paid' : 'badge-pending'}">
                            ${student.currentPaymentStatus ? '✓ Fully Paid' : '⚠️ Unpaid'}
                        </span>
                    </td>
                    <td>
                        ${student.currentPaymentStatus ?
                    `<span style="color:#059669; font-size:12px; font-weight:600;">Approved: ${student.paymentTimestamp || ''}</span>` :
                    `<div class="action-input-group">
                                <input type="password" maxlength="4" placeholder="PIN" id="pin-${student.id}" class="pin-input">
                                <button onclick="collectPayment(${student.id})" class="btn-verify">Verify</button>
                             </div>`
                }
                    </td>
                `;
                tableBody.appendChild(row);
            });
        } catch (error) {
            console.error("Dashboard fetch error:", error);
        }
    }

    async function collectPayment(studentId) {
        const pinField = document.getElementById(`pin-${studentId}`);
        if (!pinField || !pinField.value) {
            alert("Please input your father's secure 4-digit code first.");
            return;
        }

        const payload = { studentId: studentId.toString(), pin: pinField.value.trim() };

        try {
            const res = await fetch('/api/students/verify-payment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await res.json();

            if (res.ok) {
                alert("✓ " + result.success);
                loadDashboardData(); // Refresh the grid data seamlessly
            } else {
                alert("⚠️ " + (result.error || "Verification failed"));
            }
        } catch (err) {
            alert("Connection error executing transactional data pipelines.");
        }
    }

    async function triggerNextMonth() {
        if (confirm("Are you sure you want to trigger the next billing cycle for all your active route students?")) {
            try {
                const res = await fetch('/api/students/trigger-next-month', { method: 'POST' });
                if (res.ok) {
                    alert(await res.text());
                    loadDashboardData();
                }
            } catch (err) {
                alert("Error triggering billing sequences.");
            }
        }
    }

    function logoutAccount() {
        window.location.href = "/login.html?logout";
    }
</script>
</body>
</html>
