<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Student</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background-color: #f4f6f9; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .form-container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        h2 { color: #2c3e50; margin-bottom: 15px; text-align: center; }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 13px; color: #475569; }
        input, select { width: 100%; padding: 10px; border: 2px solid #cbd5e1; border-radius: 6px; font-size: 14px; outline: none; transition: border-color 0.2s; }
        input:focus, select:focus { border-color: #3b82f6; }
        .btn-submit { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
        .btn-submit:hover { background: #2563eb; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Add Student</h2>
    <form id="studentForm" onsubmit="saveStudent(event)">
        <div class="form-group">
            <label>Student Name</label>
            <input type="text" id="name" required placeholder="Enter student full name">
        </div>
        <div class="form-group">
            <label>Parent's Phone</label>
            <input type="tel" id="phone" required placeholder="Enter 10-digit mobile">
        </div>
        <div class="form-group">
            <label>Pickup Location Stop</label>
            <input type="text" id="location" required placeholder="e.g. Sector 4 Crossroad">
        </div>
        <div class="form-group">
            <label>Monthly Fee (₹)</label>
            <input type="number" id="fee" required placeholder="e.g. 1500">
        </div>
        <div class="form-group">
            <label>Monthly Custom Due Day</label>
            <select id="dueDay" required>
                <option value="1">1st of the month</option>
                <option value="5">5th of the month</option>
                <option value="10">10th of the month</option>
                <option value="15" selected>15th of the month</option>
                <option value="20">20th of the month</option>
            </select>
        </div>
        <button type="submit" class="btn-submit">Save Student</button>
        <a href="index.html" style="display:block; text-align:center; font-size:13px; color:#64748b; margin-top:12px; text-decoration:none; font-weight: 600;">← Cancel & Return</a>
    </form>
</div>

<script>
    async function saveStudent(e) {
        e.preventDefault();

        // 🧠 SYNCHRONIZED PAYLOAD: Variable keys match updated Student.java exactly!
        const payload = {
            studentName: document.getElementById('name').value.trim(),
            parentPhone: document.getElementById('phone').value.trim(),
            pickupLocation: document.getElementById('location').value.trim(),
            monthlyFee: parseFloat(document.getElementById('fee').value),
            dueDay: parseInt(document.getElementById('dueDay').value)
        };

        try {
            const res = await fetch('/api/students/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert("✓ Student profile saved successfully with custom metrics!");
                window.location.href = "index.html";
            } else {
                const textErr = await res.text();
                alert("⚠️ Server rejected addition: " + textErr);
            }
        } catch (error) {
            console.error("Network crash:", error);
            alert("⚠️ Network connectivity fault. Check server console logs.");
        }
    }
</script>
</body>
</html>
